services:
  - type: web
    name: helix-medical-nlp
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: USE_SCISPACY
        value: "false"
      - key: SUMMARIZATION_MODEL
        value: "default"
      - key: LOG_LEVEL
        value: "INFO"
      - key: PORT
        value: "8000"
